<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/normalize.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <header class = "header">
        <div class = "container flex-row">
            <a class = "header_icon" href="../../index.html">QPICK</a>
        <nav class="header_nav">
            <ul class = "header_nav_list">
                <li class = "header_nav_list_link"><a href="../../pages/catalog/index.html">Каталог</a></li>
                <li class = "header_nav_list_link"><a href="../../pages/contact/index.html">Контакты</a></li>
                <li class = "header_nav_list_link"><a href="../../pages/condition/index.html">Условия сервиса</a></li>
            </ul>
        </nav>
            <div class = "header_orderBlock">
                <div class = "header_orderBlock_liked"><img src="../../assets/icon/heart.svg" alt="heart-icon"></div>
                <a href="../../pages/cart/index.html" class = "header_orderBlock_basket"><img src="../../assets/icon/basket.svg" alt="basket-icon"></a>
            </div>
        </div>
    </header>
    <main class = "order">
        <div class = "container order_container">
            <h2 class = "order_title">Оформление заказа</h2>
            <form id="mainForm" class = "form" method = "post">
                <div class = "form_address">
                    <div class = "form_address_deliveryPrice">
                        <span>Доставка</span>
                        <span>499</span>
                    </div>
                    <div class = "form_address_iconBlock">
                        <img src="../../assets/icon/location.svg" alt="">
                        <span>Адрес доставки</span>
                    </div>
                    <select  name ="city" id="country">
                        <option>Choose country</option>
                    </select>
                    <input required  name = "street" type="text" placeholder="Улица">
                    <span class = "error"></span>
                    <input required name = "house" type="text" placeholder="Дом">
                    <span class = "error"></span>
                    <input name = "entrance" type="text" placeholder="Подъезд">
                    <span class = "error"></span>
                    <input name = "apartment" type="text" placeholder="Квартира">
                    <span class = "error"></span>
                </div>
                <div class = "form_specification">
                    <div class = "form_specification_cart">
                        <h3 class = "form_specification_cart_title">Ваш заказ</h3>
                        <ul class = "form_specification_cart_list">
                        </ul>
                    </div>
                    <div class = "form_specification_number">
                        <h3 class = "form_specification_number_title">Номер получателя</h3>
                        <input name ="telephone" required type="tel" placeholder="Номер">
                        <span class = "error"></span>
                    </div>
                    <div class = "form_specification_btn">
                        <input class = "form-submit" type="submit" value="Закончить оформление">
                    </div>
                </div>
            </form>
        </div>
    </main>
    <footer class = "footer">
        <div class = "container footer_container">
            <div class = "logo"><a href="../../index.html">QPICK</a></div>
            <div class = "footer_menu">
                <ul class = "footer_menu_list">
                    <li class = "footer_menu_list_item"><a href="#">Избранное</a></li>
                    <li class = "footer_menu_list_item"><a href="../pages/cart/index.html">Корзина</a></li>
                    <li class = "footer_menu_list_item"><a href="../pages/contact/index.html">Контакты</a></li>
                </ul>
            </div>
            <div class="footer_serviseAndLanguage">
                <div class = "footer_menu_list_item">
                    <a href="../pages/condition/index.html">Условия сервиса</a>
                </div>
                <div class = "footer_serviseAndLanguage_lan">
                    <div class = "footer_serviseAndLanguage_lan_icon">
                        <img src="../../assets/icon/planet.svg" alt="">
                    </div>
                    <span class = "language">Укр</span>
                    <span class = "language">Eng</span>
                </div>
            </div>
            <div class = "footer_messages">
                <div class = "footer_messages_icon">
                    <a href="#"><img src="../../assets/icon/Instagram.svg"></img></a>
                </div>
                <div class = "footer_messages_icon">
                    <a href="#"><img src="../../assets/icon/Telegram.svg"></img></a>
                </div>
                <div class = "footer_messages_icon">
                    <a href="#"><img src="../../assets/icon/Whatsapp.svg"></img></a>
                </div>
            </div>
        </div>
    </footer>
    <script type="module" src="../../js/order.js"></script>
</body>
</html>
